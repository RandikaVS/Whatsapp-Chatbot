# docker-compose.yml
version: "3.9"
services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  celery:
    build: .
    command: celery -A app.workers.tasks worker --loglevel=info --concurrency=8
    env_file: .env
    depends_on:
      - postgres
      - redis

  celery-beat:
    build: .
    command: celery -A app.workers.tasks beat --loglevel=info
    env_file: .env
    # Runs scheduled tasks: reset monthly usage, send reports

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: whatsapp_saas
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata: